<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Example website name</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Open Sans', sans-serif;
            background-color: #f3f5f6;
            padding-left: 100px;
            padding-right: 100px;
        }

        .headline{
            color: #7289DA;
        }

        .navbar{
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        a {
            color: #2C2F33;
            text-decoration: none;
            margin-left: 16px;
            font-weight: 700;
        }

        a:hover {
            text-decoration: underline;
        }

        .legal-content{
            padding: 8px;
        }

        .legal-text{
            margin-right: 20px;
        }
        /**
 * VARIABLES
 */
:root{
  --bg: #f8fafc;
  --panel-bg: #FFFFFF;
  --panel-border: #CCCCCC;
  --panel-title: #343f44;
  --panel-text: #54666d;
  --btn: #3eb0ef;
}

/**
 * GENERIC STYLES 
 */
body{
  position: relative;
  height: 100vh;
  padding: 0;
  margin: 0;
  font-family: 'Nunito Sans', sans-serif;
  font-weight: 600;
}

/**
 * TOGGLERS 
 */
#toggleMode{
  visibility: hidden;
}

.toggleDark,
.toggleLight{
  cursor: pointer;
  position: absolute;
  z-index: 2;
  top: 20px;
  left: 20px;
}

.toggleDark{
  display: block;
  color: #222;
}

.toggleDark:hover{
  color: blue;
}

.toggleLight{
  display: none;
  color: white;
}

#toggleMode:checked ~ .toggleDark{
  display: none;
}

#toggleMode:checked ~ .toggleLight{
  display: block;
}

/**
 * CONTAINER 
 */
#container{
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: var(--bg);
  z-index: 1;
  padding: 50px 20px;
}

#toggleMode:checked ~ #container{
  --bg: #020202;
  --panel-bg: #111413;
  --panel-border: #1f2322;
  --panel-title: #8e9294;
  --panel-text: #505456;
  --btn: #2962fe;
  
  background-color: var(--bg);
}

/**
 * PANEL 
 */
.panel{
  margin-top: 20px;
}

.panel .image{
  width: 30%;
  height: 300px;
  background-size: cover;
  background-position: center;
  border-radius: 10px 0 0 10px;
  float: left;
}

.panel .content{
  width: 70%;
  float: left;
  padding: 20px;
  background-color: var(--panel-bg);
  height: 300px;
  border-radius: 0 10px 10px 0;
  border-top: 1px solid var(--panel-border);
  border-right: 1px solid var(--panel-border);
  border-bottom: 1px solid var(--panel-border);
  box-sizing: border-box;
}

.panel .content h2{
  margin-top: 20px;
  margin-bottom: 0;
  color: var(--panel-title);
}

.panel .content p{
  margin-top: 10px;
  font-weight: 300;
  color: var(--panel-text);
}

.panel .content button{
  border: 0;
  border-radius: 3px;
  background-color: var(--btn);
  padding: 10px 20px;
  color: white;
  cursor: pointer;
}

.panel .content button:hover{
  opacity: 0.7;
}
    </style>
</head>

<body>
    <input type="checkbox" id="toggleMode">
    <label for="toggleMode" class="toggleDark">Dark Mode</label>
    <label for="toggleMode" class="toggleLight">Light Mode</label>
    <div class="navbar">
        <h1 class="headline">
            This is the main page
        </h1>

        <div>
            <a href="https://lenny-del.github.io">Home</a>
            <a href="https://lenny-del.github.io/downloads">Downloads</a>
            <a href="https://github.com/Lenny-del/" target="_blank" rel="noopener noreferrer">GitHub</a>
            <a href="https://lenny-del.github.io/discord" target="_blank" rel="noopener noreferrer">Discord</a>
            <a href="https://lenny-del.github.io/faq">FAQ</a>
        </div>
    </div>
    
    <div class="legal-content">
        <span class="legal-text"> © 2021 Example | <a href="#">EULA</a> | <a href="#">Privacy</a> </span>
    </div>
</body>

</html>
