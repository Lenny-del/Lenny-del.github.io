<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lenny-del.github.io</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Open Sans', sans-serif;
            background-color: #f3f5f6;
            padding-left: 100px;
            padding-right: 100px;
        }

        .headline{
            color: #7289DA;
        }

        .navbar{
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        a {
            color: #2C2F33;
            text-decoration: none;
            margin-left: 16px;
            font-weight: 700;
        }

        a:hover {
            text-decoration: underline;
        }

        .legal-content{
            position: fixed;
            bottom: 0;
            width: 100%;
        }

        .legal-text{
            margin-right: 20px;
        }

        /* Styling the checkbox input */
        #checkbox{
            position: fixed;
            top: 20px;
            right: 20px;
            appearance: none;
            -webkit-appearance : none;
            -moz-appearance : none;
            -o-appearance : none;
            width: 80px;
            height: 40px;
            background: black;
            border-radius: 22px;
            cursor: pointer;
            outline: none;
        }
        /* styling the circle inside the checkbox input */
        #checkbox::before{
            content: '';
            position: absolute;
            width: 40px;
            height: 35px;
            background-color:white;
            border-radius: 35px;
            top: 2px;
            left: 2px;
            cursor: pointer;
            transition: .3s linear;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <h1 class="headline">
            This is the main page
        </h1>

        <div>
            <a href="https://lenny-del.github.io">Home</a>
            <a href="https://lenny-del.github.io/downloads">Downloads</a>
            <a href="https://github.com/Lenny-del/" target="_blank" rel="noopener noreferrer">GitHub</a>
            <a href="https://lenny-del.github.io/discord" target="_blank" rel="noopener noreferrer">Discord</a>
            <a href="https://lenny-del.github.io/faq">FAQ</a>
        </div>
    </div>
    
    <div class="legal-content">
        <span class="legal-text"> © 2021 Example | <a href="#">EULA</a> | <a href="#">Privacy</a> </span>
        <input type="checkbox" id="checkbox">
    </div>
</body>

</html>
